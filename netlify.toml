[build]
  command = "hugo --environment production --gc --minify"
  publish = "public"

[build.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "hugo --environment production --gc --minify --baseURL $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --environment production --gc --minify --baseURL $DEPLOY_PRIME_URL"
